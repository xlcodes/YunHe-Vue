name: 'yunhe-vue'

volumes:
  mysql-data:
  redis_data:

networks:
  yunhe-vue:

services:
  # 根据根目录下的 Dockerfile 构建的镜像
  server:
    image: yunhe-vue/server:latest # 显式指定构建后的镜像名和标签
    healthcheck:
      test: ['CMD-SHELL', 'node /app/healthcheck.js || exit 1']
      interval: 10s # 每 10 秒探测一次
      timeout: 5s # 超时 5 秒
      retries: 3 # 连续 3 次失败才判定为 unhealthy
      start_period: 40s # 冷启动宽限期，防止应用初始化期被误杀
    build:
      context: .
      dockerfile: Dockerfile.server # 显式指定 Dockerfile 路径
    deploy:
      replicas: 2 # 启动 2 个实例，根据 CPU 核心数自行调整
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    expose:
      - 3000
    networks:
      - yunhe-vue

  admin:
    image: yunhe-vue/admin:latest
    build:
      context: .
      dockerfile: Dockerfile.admin # 显式指定 Dockerfile 路径
    ports:
      # - 80:80
      - '127.0.0.1:30080:80'
    depends_on:
      server:
        condition: service_healthy # 🚨 只有 server 探针成功，前端才启动接入流量
    networks:
      - yunhe-vue

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    # ports:
    #   - ${MYSQL_PORT}:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - yunhe-vue
    healthcheck:
      test: ['CMD', 'sh', '-c', "MYSQL_PWD='$$MYSQL_ROOT_PASSWORD' mysqladmin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # 给首次初始化数据库留足时间

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD} # 💡 注入专用的 CLI 认证变量
    command: redis-server --requirepass ${REDIS_PASSWORD} # Redis 官方镜像要求：必须通过命令行参数显式指定密码才能生效
    # ports:
    #   - ${REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    networks:
      - yunhe-vue
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
